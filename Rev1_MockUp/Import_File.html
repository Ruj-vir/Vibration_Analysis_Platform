<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดกลุ่มไฟล์ Smart Match + Export ZIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; }

        .upload-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px dashed #3b82f6; padding: 40px; text-align: center; border-radius: 8px;
            cursor: pointer; transition: 0.3s; background-color: #eff6ff; width: 100%; box-sizing: border-box;
        }
        .upload-box:hover { background-color: #dbeafe; }
        input[type="file"] { display: none; }
        .btn-upload { background-color: #3b82f6; color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }

        .controls {
            margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 8px;
            display: flex; align-items: center; justify-content: space-between; border: 1px solid #e2e8f0;
            flex-wrap: wrap; gap: 10px;
        }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; color: #0284c7; font-weight: bold;}
        
        /* ปุ่ม Export */
        .btn-export {
            background-color: #10b981; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-export:hover { background-color: #059669; }
        .btn-export:disabled { background-color: #ccc; cursor: not-allowed; }

        #result-area { margin-top: 20px; }
        .group-card {
            border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; margin-bottom: 15px;
            background-color: #fff; border-left: 5px solid #10b981;
        }
        .group-title { font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .file-list { list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; }
        .file-list li { padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9em; display: flex; justify-content: space-between; }
        .badge { background: #e5e7eb; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h2>📂 จัดกลุ่มไฟล์ + Export เป็น Folder</h2>
    
    <label class="upload-box">
        <input type="file" id="fileInput" multiple>
        <div class="btn-upload">1. เลือกไฟล์ (50+)</div>
        <span style="color: #666; font-size: 0.9em;">เลือกไฟล์ทั้งหมดที่ต้องการจัดกลุ่ม</span>
    </label>

    <div class="controls" id="controls" style="display:none;">
        <div>
            <span>🔧 แบ่งตาม: </span>
            <select id="groupMode">
                <option value="smart">🤖 Smart Match (สลับหน้า-หลังได้)</option>
                <option value="0">คำหน้าสุด (ก่อน _)</option>
                <option value="1">คำที่ 2 (หลัง _)</option>
                <option value="full">ชื่อไฟล์เดิม (ไม่แยก)</option>
            </select>
        </div>
        
        <button id="btnExport" class="btn-export">
            📦 Export เป็น ZIP (แยกโฟลเดอร์)
        </button>
    </div>

    <div id="stat-area" style="margin-top:10px; text-align:right; color:#666;"></div>
    <div id="result-area"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const resultArea = document.getElementById('result-area');
    const statArea = document.getElementById('stat-area');
    const groupModeSelect = document.getElementById('groupMode');
    const controlsDiv = document.getElementById('controls');
    const btnExport = document.getElementById('btnExport');

    let currentFiles = []; 
    let calculatedGroups = {}; // ตัวแปรเก็บผลการจัดกลุ่ม เพื่อเอาไว้ Export

    fileInput.addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
            currentFiles = Array.from(e.target.files);
            controlsDiv.style.display = 'flex';
            renderGroups();
        }
    });

    groupModeSelect.addEventListener('change', function() {
        renderGroups();
    });

    function renderGroups() {
        if (currentFiles.length === 0) return;
        const mode = groupModeSelect.value;
        const groups = {};

        currentFiles.forEach(file => {
            let nameNoExt = file.name;
            if (nameNoExt.includes('.')) nameNoExt = nameNoExt.substring(0, nameNoExt.lastIndexOf('.'));

            let groupKey = nameNoExt;
            const parts = nameNoExt.split('_');

            if (mode === 'smart') {
                // --- เพิ่ม Logic Smart Match ---
                // กรองเอาเฉพาะส่วนที่ไม่ใช่ตัวเลข
                const textParts = parts.filter(part => isNaN(part.trim()));
                
                if (textParts.length > 0) {
                    // เอาตัวหนังสือที่ยาวที่สุดมาเป็นชื่อกลุ่ม (แม่นยำที่สุด)
                    groupKey = textParts.sort((a, b) => b.length - a.length)[0];
                } else {
                    // ถ้ามีแต่ตัวเลข ให้เอาตัวหน้าสุด
                    groupKey = parts[0];
                }

            } else if (mode === '0') {
                groupKey = parts[0].trim();
            } else if (mode === '1') {
                groupKey = (parts.length > 1) ? parts[1].trim() : "Other";
            }

            if (!groups[groupKey]) groups[groupKey] = [];
            groups[groupKey].push(file);
        });

        calculatedGroups = groups; // อัปเดตข้อมูลเข้าตัวแปรกลาง
        displayGroups(groups);
    }

    function displayGroups(groups) {
        resultArea.innerHTML = '';
        const groupKeys = Object.keys(groups).sort();
        statArea.innerHTML = `ไฟล์ทั้งหมด <b>${currentFiles.length}</b> | แบ่งได้ <b>${groupKeys.length}</b> โฟลเดอร์`;

        groupKeys.forEach(key => {
            const fileList = groups[key];
            const card = document.createElement('div');
            card.className = 'group-card';
            if(fileList.length > 1) card.style.borderLeftColor = '#3b82f6'; 

            let fileItems = '';
            fileList.forEach(f => {
                fileItems += `<li><span>${f.name}</span> <span style="color:#aaa;">${(f.size/1024).toFixed(0)}KB</span></li>`;
            });

            card.innerHTML = `
                <div class="group-title">
                    <span>📁 โฟลเดอร์: "${key}"</span>
                    <span class="badge" style="background:${fileList.length > 1 ? '#dbeafe' : '#f3f4f6'}">
                        ${fileList.length} ไฟล์
                    </span>
                </div>
                <ul class="file-list">${fileItems}</ul>
            `;
            resultArea.appendChild(card);
        });
    }

    // --- ส่วนการทำงานปุ่ม Export ---
    btnExport.addEventListener('click', function() {
        if (Object.keys(calculatedGroups).length === 0) return;

        const originalText = btnExport.innerText;
        btnExport.innerText = "⏳ กำลังบีบอัดไฟล์...";
        btnExport.disabled = true;

        const zip = new JSZip();

        // วนลูปสร้าง Folder ใน Zip ตามกลุ่มที่เราจัดไว้
        Object.keys(calculatedGroups).forEach(folderName => {
            const folder = zip.folder(folderName); // สร้าง Folder ใน Zip
            const files = calculatedGroups[folderName];

            files.forEach(file => {
                // ใส่ไฟล์เข้าไปใน Folder นั้นๆ
                folder.file(file.name, file); 
            });
        });

        // สร้างไฟล์ Zip และสั่ง Download
        zip.generateAsync({type:"blob"})
            .then(function(content) {
                // สร้าง Link หลอกๆ เพื่อกดโหลด
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "Smart_Grouped_Files.zip"; // ชื่อไฟล์ Zip ปลายทาง
                link.click();

                // คืนค่าปุ่ม
                btnExport.innerText = originalText;
                btnExport.disabled = false;
            });
    });
</script>

</body>
</html>
