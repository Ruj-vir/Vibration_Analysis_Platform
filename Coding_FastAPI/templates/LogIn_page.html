<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Vibration Platform — Log In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0f172a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Header ─────────────────────────────────────────────────────────── */
        .platform-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            border-bottom: 1px solid #334155;
            color: white;
            padding: 0 24px;
            height: 54px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.40);
        }
        .platform-brand { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: #38bdf8; }

        /* ─── Center Card ─────────────────────────────────────────────────────── */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.40);
            padding: 52px 48px 44px;
            width: 380px;
            text-align: center;
        }

        .login-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 1px;
            margin-bottom: 6px;
            white-space: nowrap;
        }

        .login-subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 36px;
        }

        .btn-sso {
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 13px 0;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-decoration: none;
        }
        .btn-sso:hover  { background-color: #0284c7; color: white; }
        .btn-sso:active { transform: scale(0.98); }

        .login-footer {
            margin-top: 28px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="platform-header">
        <span class="platform-brand">⚙️ VIBRATION ANALYSIS PLATFORM</span>
    </header>

    <!-- Login Card -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-icon">⚙️</div>
            <div class="login-title">Vibration Analysis Platform</div>
            <div class="login-subtitle">Machinery Health Automated Analysis</div>

            <a href="/login" class="btn-sso">
                <i class="fa-solid fa-right-to-bracket"></i>
                Log in with SSO
            </a>

            <div class="login-footer">
                ระบบนี้ใช้การยืนยันตัวตนผ่าน GCME SSO
            </div>
        </div>
    </div>

</body>
</html>
