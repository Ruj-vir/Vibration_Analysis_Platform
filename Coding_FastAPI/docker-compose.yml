services:
  vibration:
    build: .
    container_name: vibration_app
    ports:
      - "8000:8000"
    volumes:
      - ./templates:/app/templates
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-vibration-platform-secret-key-change-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login-page"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
