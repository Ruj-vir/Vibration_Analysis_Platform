<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibration Analysis - Time Domain (Single File)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* ------------------ CSS Code ------------------ */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background-color: #004d99;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: #e9e9e9;
            flex-wrap: wrap;
        }

        .controls label {
            font-weight: bold;
        }

        .controls input[type="number"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100px;
        }

        .controls button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .controls button:hover {
            background-color: #45a049;
        }

        .chart-container {
            margin-top: 20px;
        }

        #vibrationChart {
            max-height: 400px;
            width: 100%;
        }

        #summary {
            margin-top: 20px;
            padding: 15px;
            border-top: 2px solid #004d99;
            background-color: #f9f9f9;
        }

        #summary p {
            margin: 5px 0;
        }

        footer {
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            color: white;
            background-color: #333;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔬 Time Domain Vibration Analysis Software</h1>
        <p>แสดงพฤติกรรมการสั่นสะเทือน (Amplitude) เทียบกับเวลา (Time)</p>
    </header>

    <main>
        <section class="controls">
            <h2>⚙️ ข้อมูลจำลองการสั่น</h2>
            <label for="frequency">ความถี่ (Hz):</label>
            <input type="number" id="frequency" value="10" min="1" step="1">
            
            <label for="amplitude">ความแรง (Amplitude, หน่วย: g/m/s²):</label>
            <input type="number" id="amplitude" value="5" min="0.1" step="0.5">
            
            <label for="duration">ระยะเวลาแสดงผล (วินาที):</label>
            <input type="number" id="duration" value="5" min="1" step="1">
            
            <button onclick="generateDataAndPlot()">สร้างกราฟ</button>
        </section>

        <section class="chart-container">
            <h2>📈 Time Domain Waveform</h2>
            
            <canvas id="vibrationChart"></canvas>
            <div id="summary">
                <h3>สรุปผลการวิเคราะห์</h3>
                <p><strong>ค่า Peak (ความแรงสูงสุด):</strong> <span id="peakValue">-</span></p>
                <p><strong>ค่า RMS (พลังงานรวม):</strong> <span id="rmsValue">-</span></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Software Demo for Vibration Analysis</p>
    </footer>

    <script>
        /* ------------------ JavaScript Code ------------------ */
        let vibrationChart; // ตัวแปรสำหรับเก็บ instance ของ Chart.js

        /**
         * ฟังก์ชันสำหรับการคำนวณค่า RMS (Root Mean Square)
         * @param {number[]} data - อาร์เรย์ของค่า Amplitude
         * @returns {number} ค่า RMS
         */
        function calculateRMS(data) {
            if (data.length === 0) return 0;
            const sumOfSquares = data.reduce((sum, value) => sum + value * value, 0);
            return Math.sqrt(sumOfSquares / data.length);
        }

        /**
         * ฟังก์ชันสร้างข้อมูลการสั่นสะเทือนแบบจำลอง (Sine Wave)
         * @param {number} amplitude - ความแรงสูงสุด (A)
         * @param {number} frequency - ความถี่ (f) ใน Hz
         * @param {number} duration - ระยะเวลา (T) ในวินาที
         * @param {number} sampleRate - อัตราการสุ่มตัวอย่างต่อวินาที
         * @returns {{labels: number[], data: number[]}} ข้อมูล Time และ Amplitude
         */
        function generateVibrationData(amplitude, frequency, duration, sampleRate = 512) {
            const labels = [];
            const data = [];
            const numPoints = duration * sampleRate;
            
            for (let i = 0; i < numPoints; i++) {
                // เวลา (t)
                const time = i / sampleRate;
                labels.push(time.toFixed(3)); 
                
                // สมการคลื่น Sine: A * sin(2 * pi * f * t)
                const value = amplitude * Math.sin(2 * Math.PI * frequency * time);
                data.push(value);
            }
            
            return { labels, data };
        }

        /**
         * ฟังก์ชันหลักในการสร้างข้อมูลและแสดงผลกราฟ
         */
        function generateDataAndPlot() {
            // ดึงค่าจาก input fields
            const amplitude = parseFloat(document.getElementById('amplitude').value);
            const frequency = parseFloat(document.getElementById('frequency').value);
            const duration = parseFloat(document.getElementById('duration').value);

            // ตรวจสอบข้อมูล
            if (isNaN(amplitude) || amplitude <= 0 || isNaN(frequency) || frequency <= 0 || isNaN(duration) || duration <= 0) {
                alert("กรุณาป้อนค่าที่ถูกต้องและเป็นบวก");
                return;
            }
            
            // 1. สร้างข้อมูล
            const { labels, data } = generateVibrationData(amplitude, frequency, duration);
            
            // 2. วิเคราะห์ข้อมูล
            const peakValue = Math.max(...data.map(Math.abs)); // ค่าสูงสุด (Absolute Peak)
            const rmsValue = calculateRMS(data); // ค่า RMS
            
            // 3. แสดงผลสรุป
            document.getElementById('peakValue').textContent = peakValue.toFixed(3);
            document.getElementById('rmsValue').textContent = rmsValue.toFixed(3);

            // 4. สร้างหรืออัปเดตกราฟ
            const ctx = document.getElementById('vibrationChart').getContext('2d');
            
            if (vibrationChart) {
                // อัปเดตกราฟที่มีอยู่
                vibrationChart.data.labels = labels;
                vibrationChart.data.datasets[0].data = data;
                vibrationChart.data.datasets[0].label = `Amplitude @ ${frequency} Hz`;
                vibrationChart.update();
            } else {
                // สร้างกราฟใหม่
                vibrationChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: `Amplitude @ ${frequency} Hz`,
                            data: data,
                            borderColor: 'rgb(75, 192, 192)',
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            borderWidth: 1,
                            pointRadius: 0, 
                            tension: 0.1 
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: 'Time (วินาที)'
                                }
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: 'Amplitude (ความแรง)'
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                display: true
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                            }
                        }
                    }
                });
            }
        }

        // เรียกฟังก์ชันเพื่อแสดงกราฟเริ่มต้นเมื่อโหลดหน้าเว็บ
        window.onload = generateDataAndPlot;
    </script>
</body>
</html>
